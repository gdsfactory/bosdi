name: release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-env: [py312, py313]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: ${{ matrix.python-env }}

      - name: Install LLVM 18 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y llvm-18-dev libclang-18-dev

      - name: Install openvaf-r (Linux)
        if: runner.os == 'Linux'
        run: pixi run -e ${{ matrix.python-env }} install-openvaf

      - name: Build extension
        run: pixi run -e ${{ matrix.python-env }} build

      - name: Run tests
        if: runner.os == 'Linux'
        run: pixi run -e ${{ matrix.python-env }} test

      - name: Build wheel
        run: pixi run -e ${{ matrix.python-env }} wheel

      - name: Build sdist
        if: runner.os == 'Linux' && matrix.python-env == 'py313'
        run: pixi run -e py313 sdist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-env }}
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # for OIDC PyPI trusted publisher

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        if: contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: "!(contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta'))"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
