name: release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp312-manylinux_x86_64 cp313-manylinux_x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: wheelhouse/

  test-linux:
    strategy:
      fail-fast: false
      matrix:
        python-env: [py312, py313]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: ${{ matrix.python-env }}

      - name: Install LLVM 18
        run: |
          sudo apt-get install -y llvm-18-dev llvm-18 clang-18 libclang-18-dev
          sudo ln -sf /usr/bin/llvm-lib-18 /usr/bin/llvm-lib

      - name: Install openvaf-r
        run: pixi run -e ${{ matrix.python-env }} install-openvaf

      - name: Build extension
        run: pixi run -e ${{ matrix.python-env }} build

      - name: Run tests
        run: pixi run -e ${{ matrix.python-env }} test

      - name: Build sdist
        if: matrix.python-env == 'py313'
        run: pixi run -e py313 sdist

      - uses: actions/upload-artifact@v4
        if: matrix.python-env == 'py313'
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        python-env: [py312, py313]
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: ${{ matrix.python-env }}

      - name: Build extension
        run: pixi run -e ${{ matrix.python-env }} build

      - name: Build wheel
        run: pixi run -e ${{ matrix.python-env }} wheel

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos-${{ matrix.python-env }}
          path: dist/

  publish:
    needs: [build-linux, test-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Publish to TestPyPI
        if: contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Publish to PyPI
        if: "!(contains(github.ref_name, 'rc') || contains(github.ref_name, 'dev') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta'))"
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
